# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: hermes-foundry-agent
displayName: Hermes Foundry Agent
description: Hosted Hermes worker for the Hermes TUI Foundry PoC.
metadata:
  tags:
    - Hermes
template:
  name: hermes-foundry-agent
  kind: hosted
  protocols:
    - protocol: invocations
      version: 1.0.0
agent_endpoint:
  # Keep this in sync with agent.yaml; scheduled routines and the TUI both
  # target the endpoint with x-ms-* isolation headers.
  protocols:
    - responses
  authorization_schemes:
    - type: Entra
      isolation_key_source:
        kind: Header
resources: []
